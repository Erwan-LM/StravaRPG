services:
  postgres:
    image: postgres:16-alpine
    container_name: strava-rpg-postgres
    environment:
      POSTGRES_DB: strava_rpg
      POSTGRES_USER: strava_rpg
      POSTGRES_PASSWORD: strava_rpg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strava_rpg -d strava_rpg"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
