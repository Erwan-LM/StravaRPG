<main class="min-h-screen bg-[#f7f7f5] px-6 py-8 sm:px-8">
  <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-5xl items-center">
    @if (isLoading) {
      <div class="w-full rounded-lg border border-zinc-200 bg-white p-6 text-center shadow-sm">
        <p class="text-sm font-medium text-zinc-500">Loading dashboard</p>
      </div>
    } @else if (user) {
      <div class="grid w-full gap-6 lg:grid-cols-[1fr_360px]">
        <div class="flex flex-col justify-center">
          <div class="mb-6 flex items-center gap-3">
            <img class="h-12 w-12 rounded-md border border-zinc-200 bg-white" [src]="user.avatarUrl" alt="User avatar">
            <div>
              <p class="text-sm font-medium text-zinc-500">Dashboard</p>
              <h1 class="text-4xl font-bold tracking-normal text-zinc-950 sm:text-5xl">Strava RPG</h1>
            </div>
          </div>

          <p class="max-w-2xl text-lg leading-8 text-zinc-600">
            Your profile is connected and ready for the next gameplay layer.
          </p>
        </div>

        <div class="rounded-lg border border-zinc-200 bg-white p-5 shadow-sm">
          <div class="mb-6 flex items-center justify-between gap-4">
            <div>
              <h2 class="text-base font-semibold text-zinc-950">{{ user.name }}</h2>
              <p class="mt-1 text-sm text-zinc-500">{{ user.email }}</p>
            </div>

            <img class="h-12 w-12 rounded-md border border-zinc-200 bg-white" [src]="user.avatarUrl" alt="User avatar">
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="rounded-md border border-zinc-200 bg-zinc-50 px-4 py-3">
              <p class="text-xs font-medium uppercase tracking-normal text-zinc-500">Level</p>
              <p class="mt-2 text-2xl font-bold text-zinc-950">{{ user.level }}</p>
            </div>

            <div class="rounded-md border border-zinc-200 bg-zinc-50 px-4 py-3">
              <p class="text-xs font-medium uppercase tracking-normal text-zinc-500">XP</p>
              <p class="mt-2 text-2xl font-bold text-zinc-950">{{ user.xp }}</p>
            </div>
          </div>

          <button
            type="button"
            class="mt-5 inline-flex h-10 w-full items-center justify-center gap-2 rounded-md bg-zinc-950 px-4 text-sm font-semibold text-white transition hover:bg-zinc-800"
            (click)="logout()"
          >
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6A2.25 2.25 0 0 0 5.25 5.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
            </svg>
            Logout
          </button>
        </div>
      </div>
    }
  </section>
</main>
