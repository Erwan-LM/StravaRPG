<main class="min-h-screen bg-[#f7f7f5] px-6 py-8 sm:px-8">
  <section class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-5xl items-center justify-center">
    <div class="w-full max-w-md rounded-lg border border-zinc-200 bg-white p-6 shadow-sm">
      <div class="mb-8 flex items-center gap-3">
        <img class="h-12 w-12 rounded-md border border-zinc-200 bg-white" src="https://api.dicebear.com/9.x/thumbs/svg?seed=strava-rpg" alt="Strava RPG avatar">
        <div>
          <p class="text-sm font-medium text-zinc-500">Welcome back</p>
          <h1 class="text-2xl font-bold tracking-normal text-zinc-950">Strava RPG</h1>
        </div>
      </div>

      <div class="mb-6">
        <h2 class="text-lg font-semibold text-zinc-950">Login</h2>
        <p class="mt-2 text-sm leading-6 text-zinc-600">Connect with Google to access your local dashboard.</p>
      </div>

      <button
        type="button"
        class="inline-flex h-11 w-full items-center justify-center gap-3 rounded-md border border-zinc-300 bg-white px-4 text-sm font-semibold text-zinc-950 transition hover:bg-zinc-50"
        (click)="login()"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M21.6 12.23c0-.78-.07-1.53-.2-2.23H12v4.22h5.38a4.6 4.6 0 0 1-2 3.02v2.51h3.24c1.9-1.75 2.98-4.32 2.98-7.52Z" />
          <path fill="#34A853" d="M12 22c2.7 0 4.96-.9 6.62-2.45l-3.24-2.51c-.9.6-2.04.95-3.38.95-2.6 0-4.8-1.76-5.59-4.12H3.06v2.59A10 10 0 0 0 12 22Z" />
          <path fill="#FBBC05" d="M6.41 13.87A6.01 6.01 0 0 1 6.1 12c0-.65.11-1.28.31-1.87V7.54H3.06A10 10 0 0 0 2 12c0 1.61.39 3.14 1.06 4.46l3.35-2.59Z" />
          <path fill="#EA4335" d="M12 6.01c1.47 0 2.79.51 3.83 1.5l2.87-2.87C16.96 3.02 14.7 2 12 2a10 10 0 0 0-8.94 5.54l3.35 2.59C7.2 7.77 9.4 6.01 12 6.01Z" />
        </svg>
        Login Google
      </button>
    </div>
  </section>
</main>
